---
# SAP production-readiness validation orchestrator.
#
# Inventory is generated from inputs/servers.csv and inputs/instances.csv.
# Modern component groups are generated alongside the legacy hana_db/nw_app
# aliases required by the existing validated task conditions.
#
# Cloud, DR, and HA task files are deliberately not imported until their
# required infrastructure and identifiers exist.

- name: "Play 1: run SAP validation checks"
  hosts: "{{ target_group | default('sap_hosts') }}"
  gather_facts: true
  become: true
  serial: "{{ validation_batch_size | default(50) }}"
  max_fail_percentage: 100
  vars:
    run_dir: "{{ validation_run_dir | default(playbook_dir ~ '/artifacts/' ~ run_timestamp) }}"
    manifest_fragment_dir: "{{ run_dir }}/.manifest"
    host_dir: "{{ run_dir }}/{{ server_id | default(inventory_hostname) }}"
    host_report_path: "{{ host_dir }}/report.md"
    host_results_path: "{{ host_dir }}/results.json"
    host_metadata_path: "{{ host_dir }}/metadata.json"
    host_status_path: "{{ host_dir }}/status.json"
    host_raw_dir: "{{ host_dir }}/raw"

  pre_tasks:
    - name: "SETUP: compute a run timestamp shared by every host"  # noqa: run-once[task]
      run_once: true
      delegate_to: localhost
      delegate_facts: true
      ansible.builtin.set_fact:
        validation_shared_run_timestamp: >-
          {{
            hostvars['localhost'].validation_shared_run_timestamp
            | default(run_timestamp | default(lookup('pipe', 'date +%Y%m%d_%H%M%S')))
          }}
      tags: always

    - name: "SETUP: adopt the shared timestamp on every host"
      ansible.builtin.set_fact:
        run_timestamp: "{{ hostvars['localhost']['validation_shared_run_timestamp'] }}"
      tags: always

    - name: "LOCAL: create run, host, and manifest-fragment directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ run_dir }}"
        - "{{ manifest_fragment_dir }}"
        - "{{ host_dir }}"
      delegate_to: localhost
      become: false
      tags: always

    - name: "LOCAL: create optional per-host raw-output directory"
      ansible.builtin.file:
        path: "{{ host_raw_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false
      when: save_raw_outputs | bool
      tags: always

    - name: "REPORT: initialize results accumulator"
      ansible.builtin.set_fact:
        hana_check_results: []
      tags: always

  tasks:
    - name: "LOAD: connectivity checks"
      ansible.builtin.import_tasks: tasks/connectivity.yml

    - name: "LOAD: HANA system-health checks"
      ansible.builtin.import_tasks: tasks/system_health.yml
      when: inventory_hostname in (groups.get('hana_db', []))

    - name: "LOAD: HANA configuration checks"
      ansible.builtin.import_tasks: tasks/configuration.yml
      when: inventory_hostname in (groups.get('hana_db', []))

    - name: "LOAD: HANA backup checks"
      ansible.builtin.import_tasks: tasks/backup.yml
      when: inventory_hostname in (groups.get('hana_db', []))

    - name: "LOAD: security checks"
      ansible.builtin.import_tasks: tasks/security.yml

    - name: "LOAD: OS baseline checks"
      ansible.builtin.import_tasks: tasks/os_baseline.yml

    - name: "LOAD: SAP application checks"
      ansible.builtin.import_tasks: tasks/sap_app.yml

    # tasks/cloud.yml is intentionally not imported until an AWS DLM policy
    # ID and controller credentials are confirmed.

    - name: "LOAD: monitoring checks"
      ansible.builtin.import_tasks: tasks/monitoring.yml

    # FUTURE: intentionally not wired into the runnable play.
    # - import_tasks: tasks/replication_dr.yml
    # - import_tasks: tasks/ha_cluster.yml

  post_tasks:
    - name: "LOCAL: write this host's Markdown report"
      ansible.builtin.copy:
        dest: "{{ host_report_path }}"
        mode: "0644"
        content: |
          # SAP Validation Report — {{ inventory_hostname }}

          **Generated:** {{ ansible_date_time.iso8601 }}<br>
          **Inventory groups:** {{ group_names | join(', ') }}<br>
          **HANA SID:** {{ hana_sid | default('n/a') }}<br>
          **HANA instance:** {{ hana_instance_number | default('n/a') }}<br>
          **HANA admin:** {{ hana_admin_user | default('n/a') }}<br>
          **Application SID:** {{ app_sid | default('n/a') }}<br>
          **Application instance:** {{ app_instance_number | default('n/a') }}<br>
          **Application admin:** {{ app_admin_user | default('n/a') }}<br>
          **Strict validation:** {{ hana_strict_validation | bool }}<br>
          **Checks run this pass:** {{ ansible_run_tags | default(['all']) | join(', ') }}<br>

          ## Summary

          | Check | Status | Details |
          |---|---:|---|
          {% for r in hana_check_results %}| {{ r.check }} | {{ r.status }} | {{ r.details | string | replace('|', '\\|') | replace('\n', '<br>') }} |
          {% endfor %}
          {% if save_raw_outputs %}

          ## Raw outputs

          Saved to `raw/` in this server folder.
          {% endif %}
      delegate_to: localhost
      become: false
      tags: always

    - name: "LOCAL: write this host's structured result list"
      ansible.builtin.copy:
        dest: "{{ host_results_path }}"
        mode: "0644"
        content: "{{ hana_check_results | to_nice_json }}"
      delegate_to: localhost
      become: false
      tags: always

    - name: "LOCAL: write this host's metadata"
      ansible.builtin.copy:
        dest: "{{ host_metadata_path }}"
        mode: "0644"
        content: >-
          {{
            {
              'server_id': (server_id | default(inventory_hostname)),
              'inventory_hostname': inventory_hostname,
              'ansible_host': (ansible_host | default(inventory_hostname)),
              'physical_hostname': (physical_hostname | default('')),
              'physical_ip': (physical_ip | default('')),
              'environment': (sap_environment | default('')),
              'landscape': (sap_landscape_id | default('')),
              'groups': group_names,
              'sap_instances': (sap_instances | default([]))
            } | to_nice_json
          }}
      delegate_to: localhost
      become: false
      tags: always

    - name: "LOCAL: write this host's completion status"
      ansible.builtin.copy:
        dest: "{{ host_status_path }}"
        mode: "0644"
        content: >-
          {{
            {
              'server_id': (server_id | default(inventory_hostname)),
              'execution_status': 'COMPLETED',
              'pass_count': (hana_check_results | selectattr('status', 'equalto', 'PASS') | list | length),
              'fail_count': (hana_check_results | selectattr('status', 'equalto', 'FAIL') | list | length),
              'error_count': (hana_check_results | selectattr('status', 'equalto', 'ERROR') | list | length),
              'warn_count': (hana_check_results | selectattr('status', 'in', ['WARN', 'SKIPPED']) | list | length)
            } | to_nice_json
          }}
      delegate_to: localhost
      become: false
      tags: always

    - name: "REPORT: build this host's manifest fragment data"
      ansible.builtin.set_fact:
        host_manifest_entry:
          host: "{{ inventory_hostname }}"
          groups: "{{ group_names }}"
          checks_run: "{{ ansible_run_tags | default(['all']) }}"
          server_id: "{{ server_id | default(inventory_hostname) }}"
          report_file: "{{ (server_id | default(inventory_hostname)) ~ '/report.md' }}"
          raw_output_dir: "{{ ((server_id | default(inventory_hostname)) ~ '/raw') if (save_raw_outputs | bool) else None }}"
          pass_count: "{{ hana_check_results | selectattr('status', 'equalto', 'PASS') | list | length }}"
          fail_count: "{{ hana_check_results | selectattr('status', 'equalto', 'FAIL') | list | length }}"
          error_count: "{{ hana_check_results | selectattr('status', 'equalto', 'ERROR') | list | length }}"
          warn_count: "{{ hana_check_results | selectattr('status', 'in', ['WARN', 'SKIPPED']) | list | length }}"
      tags: always

    - name: "LOCAL: write this host's manifest fragment"
      ansible.builtin.copy:
        dest: "{{ manifest_fragment_dir }}/{{ server_id | default(inventory_hostname) }}.json"
        mode: "0644"
        content: "{{ host_manifest_entry | to_nice_json }}"
      delegate_to: localhost
      become: false
      tags: always

- name: "Play 2: build the run manifest"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tags: always
  vars:
    run_dir: "{{ validation_run_dir | default(playbook_dir ~ '/artifacts/' ~ run_timestamp) }}"
    manifest_fragment_dir: "{{ run_dir }}/.manifest"
    invoked_command: "not captured -- pass -e invoked_command=... or use sap_validate.py"

  tasks:
    - name: "FIND: manifest fragments written by Play 1"
      ansible.builtin.find:
        paths: "{{ manifest_fragment_dir }}"
        patterns: "*.json"
      register: fragment_files

    - name: "READ: parse each fragment"
      ansible.builtin.set_fact:
        manifest_entries: >-
          {{ (manifest_entries | default([])) + [lookup('file', item.path) | from_json] }}
      loop: "{{ fragment_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: "WRITE: run manifest / table of contents"
      ansible.builtin.copy:
        dest: "{{ run_dir }}/_manifest.md"
        mode: "0644"
        content: |
          # SAP Validation Run — {{ run_timestamp }}

          Command: `{{ invoked_command }}`<br>
          **Ansible tags requested:** {{ ansible_run_tags | default(['all']) | join(', ') }}<br>
          **Ansible limit applied:** {{ ansible_limit | default('(none)') }}<br>
          **Hosts in this run:** {{ manifest_entries | default([]) | length }}<br>

          {% for e in (manifest_entries | default([])) | sort(attribute='host') %}
          ## {{ e.host }}

          - **Groups:** {{ e.groups | join(', ') }}
          - **Checks:** {{ e.checks_run | join(', ') }}
          - **Results:** {{ e.pass_count }} pass, {{ e.fail_count }} fail,
            {{ e.error_count }} error, {{ e.warn_count }} warn/skip
          - **Report:** [{{ e.report_file }}]({{ e.report_file }})
          - **Raw outputs:**
            {{ ('`' ~ e.raw_output_dir ~ '/`') if e.raw_output_dir else '-' }}
          {% endfor %}

    - name: "CLEANUP: remove manifest fragments"
      ansible.builtin.file:
        path: "{{ manifest_fragment_dir }}"
        state: absent
