[defaults]
# The Python runner can override this with --forks. Keep a conservative but
# scalable default for direct ansible-playbook usage.
forks = 50
inventory = generated/inventory.yml
host_key_checking = True
timeout = 20

# Reuse cached facts for repeated validation passes. Remove the cache directory
# or use ansible-playbook --flush-cache when a fresh snapshot is required.
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 3600

allow_world_readable_tmpfiles = True
retry_files_enabled = False

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-cp-%%h-%%p-%%r
